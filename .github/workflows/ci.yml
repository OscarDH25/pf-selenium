name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for services
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/api/health | grep -q "OK"; then
              break
            fi
            sleep 2
          done
          curl -fsS http://localhost:4444/wd/hub/status > /dev/null

      - name: Ensure wrappers are executable
        run: |
          chmod +x api-tests/mvnw
          chmod +x e2e-java/mvnw

      - name: API tests
        run: ./api-tests/mvnw -f api-tests/pom.xml test

      - name: E2E Java
        env:
          E2E_BASE_URL: http://host.docker.internal:8080
          E2E_SELENIUM_URL: http://localhost:4444/wd/hub
        run: ./e2e-java/mvnw -f e2e-java/pom.xml test

      - name: E2E Node
        run: |
          cd e2e
          npm ci
          npm test
